<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Database Place</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      font-family: Arial, sans-serif;
      color: white;
      text-align: center;
      padding: 24px;
    }

    .card {
      max-width: 700px;
      width: 100%;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 18px;
      padding: 48px 32px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(8px);
    }

    .badge {
      display: inline-block;
      font-size: 12px;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(59, 130, 246, 0.18);
      color: #bfdbfe;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 48px;
      line-height: 1.1;
    }

    .tagline {
      font-size: 20px;
      color: #cbd5e1;
      margin-bottom: 28px;
    }

    .status {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 14px;
    }

    .message {
      font-size: 18px;
      color: #e2e8f0;
      margin-bottom: 26px;
    }

    .services {
      font-size: 16px;
      color: #93c5fd;
      margin-bottom: 24px;
    }

    .footer {
      font-size: 14px;
      color: #94a3b8;
    }

    a {
      color: #93c5fd;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    @media (max-width: 640px) {
      h1 {
        font-size: 36px;
      }

      .tagline {
        font-size: 18px;
      }

      .status {
        font-size: 20px;
      }

      .message {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">Coming Soon</div>
    <h1>The Database Place</h1>
    <div class="tagline">Modern Data Analytics, Cloud Data Systems, and AI Consulting</div>
    <div class="status">🚧 Website Under Construction 🚧</div>
    <div class="message">
      We’re building something exciting.<br />
      A new home for analytics consulting, automation, and modern data solutions.
    </div>
    <div class="services">
      Data Lakes • Dashboards • Automation • AI
    </div>
    <div class="footer">
      databaseplace.tech
    </div>
  </div>
</body>
</html>
